# Append to the missions list in .gatehouse/lead/missions.yaml (single global file)

- id: <mission_id>
  status: queued
  priority: P1
  objective: "one-line goal"
  done_when:
    - "verifiable acceptance criterion"
  must_not:
    - "boundary constraint"
  # notes optional: user background / motivation / style only (not verifiable)
  notes: |
    Optional: user background and context.
  # user_topology / user_skill: only when the user explicitly specifies; omit otherwise
  # user_topology: "user-explicit topology requirement"
  # user_skill: "user-explicit skill requirement"
