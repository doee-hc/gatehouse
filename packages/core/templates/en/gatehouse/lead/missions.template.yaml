# 在 .gatehouse/lead/missions.yaml 的 missions 列表中追加条目（全局唯一文件）

- id: <mission_id>
  status: queued
  priority: P1
  objective: "一句话目标"
  done_when:
    - "可验证验收条件"
  must_not:
    - "边界约束"
  # notes optional. Default: user background/context only — no topology or skill hints.
  # Only when the user explicitly specifies:
  #   [user-specified·topology] …
  #   [user-specified·skill] …
  notes: |
    Optional: user background and context.
