# Copy to .gatehouse/trees/<mission_id>/node-briefs/<node_id>.yaml
node_id: <node_id>
role: Executor
your_work:
  - Concrete deliverable for this node
not_your_job:
  - Out of scope (list sibling scopes here to prevent overlap)
acceptance_slice:
  - path: reports/<node_id>.md
  - Hard word band example: 1500–1800 words markdown, one-shot within ±10% (no edit/count loops)
  - Deliver only this node's path; do not read sibling node artifacts
