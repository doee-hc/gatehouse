# 复制到 .gatehouse/trees/<mission_id>/node-briefs/<node_id>.yaml
node_id: <node_id>
role: 执行成员
your_work:
  - 本节点具体产出（行动依据）
not_your_job:
  - 非本节点职责（勿扩大范围；并列 sibling 的职责写在此，避免内容重叠）
acceptance_slice:
  - path: reports/<node_id>.md
  - 字数硬区间示例：1500–1800 字 markdown，±10% 内一次性交付（勿反复 edit 计字）
  - 只交付本节点 path；勿 read sibling 节点 artifact
