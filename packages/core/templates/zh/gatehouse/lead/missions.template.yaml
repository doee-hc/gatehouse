# 在 .gatehouse/lead/missions.yaml 的 missions 列表中追加条目（全局唯一文件）

- id: <mission_id>
  status: queued
  priority: P1
  objective: "一句话目标"
  done_when:
    - "可验证验收条件"
    # 主交付物（任选一种写法）：
    # - path: reports/article.html
    # - "path: reports/article.html"
    # - "文件存在: reports/article.html"
  must_not:
    - "边界约束"
  # notes 可选：仅用户背景/动机/风格等不可验收上下文
  notes: |
    可选：用户背景与上下文。
  # user_topology / user_skill：仅当用户明确指定时填写；未指定则省略
  # user_topology: "用户明确指定的拓扑要求"
  # user_skill: "用户明确指定的 skill 要求"
